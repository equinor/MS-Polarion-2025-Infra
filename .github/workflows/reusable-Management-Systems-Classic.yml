name: ♻ Management Systems Classic

on:
  workflow_call:
    inputs:
      environmentName:
        description: The name of the GitHub environment that this job references.
        type: string
        required: false
      resourceGroupName:
        description: The name of the resource group.
        type: string
        required: true
      location:
        description: The location to create the resources in.
        type: string
        required: true
      environmentType:
        description: The type of environment, NONPROD or PROD.
        type: string
        required: true
      solution:
        description: solution to be deployed
        type: string
        required: true

run-name: ${{ github.actor }} started deployment of MS Docmap - S499

permissions:
  contents: read # Required to checkout the repository
  id-token: write # Required to login to Azure using OIDC

defaults:
  run:
    shell: pwsh

env:
  TenantID: ${{ secrets.AZURE_TENANT_ID }}
  AppId: ${{ secrets.S499_AZURE_CLIENT_ID }}
  Subscription: ${{ secrets.S499_AZURE_SUBSCRIPTION_ID }}
  AppSecret: ${{ secrets.S499_AZURE_CLIENT_SECRET }}
  FKEYPW: ${{ secrets.S499_AZURE_FKEYPW }}
  SubscriptionPrefix: "S499"
  ModulesPath: "./template-bundles/omnia-classic/"
  location: "norwayeast"
  resourceGroupName: "MS-POLARION-2025"
  KeyVaultName: "MS-POLARION-2025-KV"

jobs:
  deploy-polarion:
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environmentName }}
    env:
      ModuleName: Management-Systems-Classic
      environmentName: ${{ inputs.environmentName }}
      resourceGroupName: ${{ inputs.resourceGroupName }}
      ACTIONS_STEP_DEBUG: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Azure module to resolve Token issue
        uses: ./.github/actions/az-install
        with:
          version: 11.6.0 # This version of PS remediates the OIDC token expiry issue - #10249

      - name: Connect to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Prerequisites
        uses: azure/powershell@v3
        with:
          azPSVersion: "latest"
          inlineScript: |
            Get-AzTenant

            Write-Output "Enabling AZ logging..."
            az configure --defaults logging.enable_log_file=yes

            # Write-Output "Installing modules..."

            # Install-Module -Name Microsoft.PowerShell.SecretManagement -Repository PSGallery -Force
            # Install-Module Az.KeyVault -Repository PSGallery -Force
            # Install-Module Az.Accounts -force -MaximumVersion "3.0.5"
            # Install-Module Az.Resources -force -MaximumVersion "7.6.0"
            # Install-Module Az.Network -force -MaximumVersion "7.10.0"
            # Install-Module Az.Compute -force -MaximumVersion "8.5.0"
            # Install-Module -Name AzureAD -Force -AllowClobber
            # Import-Module Microsoft.PowerShell.SecretManagement
            # Import-Module Az.KeyVault

            # Check for external IP address
            $runner = (Invoke-RestMethod -Uri https://ipinfo.io/json).ip
            Write-Output "Runner: $runner"


            Write-Output "Time start deployment: $(get-date)"
            New-AzSubscriptionDeployment -Name "${{inputs.solution}}-ManualRun-$randomString" `
                -TemplateFile ".\Bicep\main.bicep" `
                -TemplateParameterFile ".\Bicep\Environments\${{inputs.environmentName}}\1.main.json" `
                -resourceGroupName "${{inputs.resourceGroupName}}" `
                -location "${{inputs.location}}" `
                -rgLocation "${{inputs.location}}" `
                -solution "${{inputs.solution}}" `
                -githubRepository (@{Repository = "https://github.com/equinor/news-scanner-infra"}) `
                -environment "${{inputs.environmentName}}" `
                -runner $runner `
                -includeRunnerAccess $true # -whatif
              Write-Output "Time end deployment: $(get-date)"

      - name: Deploy Step 2 - Deploy Credentials to Keyvault
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            Push-Location ./Manual

            # Check for external IP address
            $runner2 = (Invoke-RestMethod -Uri https://ipinfo.io/json).ip
            Write-Output "Runner: $runner2"


            $vms = 1..4
            # $sqlServers = 1..1
            # $passPhrase = 1..1
            $credentialsToCreate = @{}

            Foreach ($vm in $vms) {
              $existing = @()
              $existing = get-azKeyVaultSecret -vaultName "${{ inputs.solution }}-Kv2-${{ inputs.environmentName }}" -Name "${{ env.SubscriptionPrefix }}POLWS$('{0:d2}' -f $vm)${{ inputs.environmentName }}-localadmin-password"

              if ($null -like $existing) {
                Write-Output "Secret does not exist, generating secret..." 
                $credentialsToCreate.Add("${{ env.SubscriptionPrefix }}POLWS$('{0:d2}' -f $vm)${{ inputs.environmentName }}-localadmin-password", $(.\GeneratePassword.ps1))
              }
              else {
                Write-Output "Secret exists, skipping recreation..."
              }
            }

            Foreach ($sqlserver in $sqlServers) {
              $sqexisting = @()
              $sqexisting = get-azKeyVaultSecret -vaultName "${{ inputs.solution }}-Kv2-${{ inputs.environmentName }}" -Name "${{ env.SubscriptionPrefix }}POLSQ$('{0:d2}' -f $sqlserver)${{ inputs.environmentName }}"

              if ($null -like $sqexisting) {
                Write-Output "Secret does not exist, generating secret..." 
                $credentialsToCreate.Add("${{ env.SubscriptionPrefix }}POLSQ$('{0:d2}' -f $sqlserver)${{ inputs.environmentName }}", $(.\GeneratePassword.ps1))
              }
              else {
                Write-Output "Secret exists, skipping recreation..."
              }
            }

            Foreach ($p in $passPhrase) {
              $passExisting = @()
              $passExisting = get-azKeyVaultSecret -vaultName "${{ inputs.solution }}-Kv2-${{ inputs.environmentName }}" -Name "${{ env.SubscriptionPrefix }}POLSQ$('{0:d2}' -f $p)${{ inputs.environmentName }}-passPhrase"

              if ($null -like $passExisting) {
                Write-Output "Secret does not exist, generating secret..." 
                $credentialsToCreate.Add("${{ env.SubscriptionPrefix }}POLSQ$('{0:d2}' -f $p)${{ inputs.environmentName }}-passPhrase", $(.\GeneratePassword.ps1))
              }
              else {
                Write-Output "Secret exists, skipping recreation..."
              }
            }
            Pop-Location

            Write-Output "Deploying credentials... - ${{ inputs.resourceGroupName }}-${{ inputs.environmentName }}"
            New-AzResourceGroupDeployment -Name "Step-2-${{ github.actor }}-$(get-date -format 'yyyy.MM.dd')" `
              -TemplateFile .\Bicep\modules\keyvault-resources.bicep `
              -credentials $CredentialsToCreate `
              -environment "${{ inputs.environmentName }}" `
              -keyVaultName '${{ inputs.solution }}-Kv2-${{ inputs.environmentName }}' `
              -resourceGroupName "${{ env.SubscriptionPrefix }}-${{inputs.resourceGroupName}}-${{inputs.environmentName}}" `
              -rgName "${{ env.SubscriptionPrefix }}-${{inputs.resourceGroupName}}-${{inputs.environmentName}}" `
              -rgLocation "${{ env.location }}" # -whatif

      - name: Deploy Step 3 - Deploy Virtual Machines
        uses: azure/powershell@v3
        with:
          azPSVersion: "latest"
          inlineScript: |
            Write-Output "Time start VM deployment: $(get-date)"
            New-AzResourceGroupDeployment -Name "Step-3-VMs-${{ github.actor }}-$(get-date -format 'yyyy.MM.dd')" `
              -TemplateFile ".\Bicep\modules\main-deployment.bicep" `
              -TemplateParameterFile ".\Bicep\Environments\${{inputs.environmentName}}\2.main-deployment.json" `
              -resourceGroupName "${{ env.SubscriptionPrefix }}-${{inputs.resourceGroupName}}-${{inputs.environmentName}}" `
              -solution "${{inputs.solution}}" `
              -KeyVaultName "${{ inputs.solution }}-Kv2-${{ inputs.environmentName }}" `
              -environment "${{inputs.environmentName}}" # -whatif
            Write-Output "Time end VM deployment: $(get-date)"

      - name: Deploy Step 4 - Harden Key Vault Network Access
        uses: azure/powershell@v3
        with:
          azPSVersion: "latest"
          inlineScript: |
            # Runner parameter is still required by the template, but runner access is explicitly disabled below.
            $runner = (Invoke-RestMethod -Uri https://ipinfo.io/json).ip
            Write-Output "Runner: $runner"

            Write-Output "Time start hardening deployment: $(get-date)"
            New-AzSubscriptionDeployment -Name "${{inputs.solution}}-Harden-$randomString" `
                -TemplateFile ".\Bicep\main.bicep" `
                -TemplateParameterFile ".\Bicep\Environments\${{inputs.environmentName}}\1.main.json" `
                -resourceGroupName "${{inputs.resourceGroupName}}" `
                -location "${{inputs.location}}" `
                -rgLocation "${{inputs.location}}" `
                -solution "${{inputs.solution}}" `
                -githubRepository (@{Repository = "https://github.com/equinor/news-scanner-infra"}) `
                -environment "${{inputs.environmentName}}" `
                -runner $runner `
                -includeRunnerAccess $false # -whatif
            Write-Output "Time end hardening deployment: $(get-date)"

      - name: Deploy Step 5 - Create Admin_SecurityGroups for VMs
        uses: azure/powershell@v2
        with:
          azPSVersion: latest
          inlineScript: |
            # Define headers for the REST method
            $headers = @{
              "Accept" = "application/json"
            }

            # Define members for the JSON data
            $members = @("a_torme", "a_otras", "a_mhaag")

            # Get the resource group name
            $resourceGroupName = "${env:SubscriptionPrefix}-${env:resourceGroupName}-${env:environmentName}" # Replace with your resource group name

            # Get the list of VMs in the resource group
            $vmList = Get-AzVM -ResourceGroupName $resourceGroupName | ForEach-Object { $_.Name }

            Write-Output "VmList: $($vmList -join ', ')"

            # Check if there are any VMs in the list
            if ($vmList.Count -eq 0) {
              Write-Output "No VMs found in resource group $resourceGroupName"
              exit 1
            }

            # Loop through each VM in the list
            foreach ($vmName in $vmList) {
              # Create JSON data for each server
              $jsonData = @{
                "serverName" = $vmName
                "members"    = $members
              } | ConvertTo-Json

              Write-Output "JsonData for $vmName: $jsonData"
              
              $scriptBlock = @"
                try {
                  # Invoke the REST method for each server
                  Invoke-RestMethod -Uri "https://ocn-adgroup.equinor.com/api/ServerAdGroup" -Method Post -Body $jsonData -ContentType "application/json" -Headers $headers
                }
                catch {
                  Write-Error "Failed to invoke REST method for server $vmName"
                  exit 1
                }
            "@
                try {
                  # Run the script on the VM
                  Invoke-AzVMRunCommand -ResourceGroupName $resourceGroupName -VMName $vmName -CommandId 'RunPowerShellScript' -ScriptString $scriptBlock -errorAction Stop
                }
                catch {
                  $error[0] | Format-List -Force
                  # Write-Error "Failed to run command on VM $vmName"
                  exit 1
                }
                
            }

